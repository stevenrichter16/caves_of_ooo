<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Shifting Zone — The Saccharine Concord</title>
<style>
  :root { --bg:#100208; --hud:#e8a; --hud-label:#3a1a2c; --hud-stat:#ffd0e0; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--hud); font-family:'Menlo','Courier New',Consolas,monospace; overflow:hidden; height:100vh; height:100dvh; user-select:none; -webkit-user-select:none; touch-action:none; }
  #wrapper { padding:14px; box-sizing:border-box; height:100vh; height:100dvh; display:flex; flex-direction:column; }
  #hud { color:var(--hud); font-size:11px; letter-spacing:1.4px; margin-bottom:8px; border-bottom:1px solid #2c1422; padding-bottom:8px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:6px 16px; text-shadow:0 0 5px rgba(255,160,200,.3); flex-shrink:0; }
  #hud .group { display:flex; gap:14px; flex-wrap:wrap; }
  .label { color:var(--hud-label); } .stat { color:var(--hud-stat); }
  .gold { color:#ffd870; }
  #screen { font-size:13px; line-height:1.0; white-space:pre; text-shadow:0 0 5px rgba(255,180,210,.5),0 0 18px rgba(255,180,160,.18); cursor:crosshair; flex:1; overflow:hidden; }
  .scanlines { position:fixed; inset:0; background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0,rgba(0,0,0,0) 2px,rgba(0,0,0,.16) 3px,rgba(0,0,0,0) 4px); pointer-events:none; z-index:100; }
  .vignette { position:fixed; inset:0; background:radial-gradient(ellipse at center,rgba(0,0,0,0) 50%,rgba(0,0,0,.85) 100%); pointer-events:none; z-index:99; }
  .crt-glow { position:fixed; inset:0; box-shadow:inset 0 0 220px rgba(255,160,200,.07); pointer-events:none; z-index:98; }
  .bloom-flash { position:fixed; inset:0; background:rgba(255,180,200,0); pointer-events:none; z-index:97; }
  a.back { position:fixed; top:10px; right:14px; color:#3a1a2c; font-size:11px; letter-spacing:2px; text-decoration:none; z-index:200; padding:4px 8px; }
  a.back:hover,a.back:active { color:#e8a; }
  .hint { position:fixed; bottom:8px; left:14px; color:#3a1a2c; font-size:10px; letter-spacing:1.5px; z-index:200; }
</style>
</head>
<body>
  <a href="index.html" class="back">&lt; ZONES</a>
  <div id="wrapper">
    <div id="hud">
      <div class="group">
        <span><span class="label">SUGAR:</span> <span class="stat" id="hud-sugar">88.4%</span></span>
        <span><span class="label">SWEETNESS:</span> <span class="stat gold" id="hud-sweet">CLOYING</span></span>
        <span><span class="label">HR:</span> <span class="stat" id="hud-hr">71</span></span>
        <span><span class="label">OP:</span> <span class="stat">DR HARLAN WEBB</span></span>
      </div>
      <div class="group">
        <span><span class="label">DEPTH:</span> <span class="stat">SURFACE+12m</span></span>
        <span><span class="label">CRYSTALS:</span> <span class="stat" id="hud-crystals">42</span></span>
        <span><span class="label">VISCOSITY:</span> <span class="stat" id="hud-visc">SYRUP</span></span>
        <span><span class="label">ZONE:</span> <span class="stat">SACCHARINE CONCORD</span></span>
      </div>
    </div>
    <div id="screen"></div>
  </div>
  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div class="crt-glow"></div>
  <div class="bloom-flash" id="bloom"></div>
  <div class="hint">DRAG THROUGH SYRUP &middot; CRYSTALS BLOOM AT RANDOM</div>

  <script>
  'use strict';
  const screen = document.getElementById('screen');
  const bloomEl = document.getElementById('bloom');
  const FONT_W = 7.81, FONT_H = 13;
  let W=110, H=34, CX=55, CY=17;
  let playerX=CX, playerY=CY, targetX=CX, targetY=CY;
  let crystals=[];
  let blooms=[];
  let syrup=[];   // syrup channels — slow flow lines
  let sparkles=[];
  let t=0;
  let bloomFlashLevel=0;

  function computeSize() {
    const w = window.innerWidth - 28;
    const h = window.innerHeight - 80;
    W = Math.max(50, Math.floor(w/FONT_W));
    H = Math.max(18, Math.floor(h/FONT_H));
    CX = Math.floor(W/2); CY = Math.floor(H/2);
    initWorld();
  }

  function initWorld(){
    crystals=[]; blooms=[]; syrup=[]; sparkles=[];
    // Crystal formations — clusters of #, with center ##
    const numClusters = Math.max(4, Math.floor(W/16));
    for (let i=0;i<numClusters;i++){
      const cx = ((Math.random()*W)|0);
      const cy = ((Math.random()*H)|0);
      const size = 4 + ((Math.random()*5)|0);
      for (let j=0;j<size;j++){
        const ox = ((Math.random()-0.5)*5)|0;
        const oy = ((Math.random()-0.5)*4)|0;
        crystals.push({
          x: cx+ox, y: cy+oy,
          phase: Math.random()*Math.PI*2,
          big: Math.random()<0.3,
          gold: Math.random()<0.18,
          rose: Math.random()<0.4
        });
      }
    }
    // Syrup channels — vertical-ish flowing lines
    for (let i=0;i<6;i++){
      syrup.push({
        x: ((Math.random()*W)|0),
        amp: 1+Math.random()*3,
        phase: Math.random()*Math.PI*2,
        speed: 0.04+Math.random()*0.06
      });
    }
    // Sparkles
    for (let i=0;i<24;i++){
      sparkles.push({
        x: Math.random()*W, y: Math.random()*H,
        vx: (Math.random()-0.5)*0.04, vy: (Math.random()-0.5)*0.04,
        phase: Math.random()*Math.PI*2,
        gold: Math.random()<0.3
      });
    }
  }

  function maybeBloom(){
    if (Math.random() < 0.025 && blooms.length < 3){
      blooms.push({
        x: ((Math.random()*W)|0),
        y: ((Math.random()*H)|0),
        age: 0,
        max: 24+((Math.random()*12)|0)
      });
      bloomFlashLevel = 0.6;
    }
  }

  function isCrystal(x,y){
    for (const c of crystals){
      if (c.x===x && c.y===y) return c;
    }
    return null;
  }

  // Input
  function setTarget(clientX, clientY){
    const r = screen.getBoundingClientRect();
    const x = Math.floor((clientX-r.left)/(r.width/W));
    const y = Math.floor((clientY-r.top)/(r.height/H));
    if (x>=0 && x<W && y>=0 && y<H){ targetX=x; targetY=y; }
  }
  let dragging=false;
  screen.addEventListener('mousedown', e=>{ dragging=true; setTarget(e.clientX,e.clientY); });
  window.addEventListener('mousemove', e=>{ if(dragging) setTarget(e.clientX,e.clientY); });
  window.addEventListener('mouseup', ()=>dragging=false);
  screen.addEventListener('touchstart', e=>{ const t=e.touches[0]; setTarget(t.clientX,t.clientY); e.preventDefault(); }, {passive:false});
  screen.addEventListener('touchmove', e=>{ const t=e.touches[0]; setTarget(t.clientX,t.clientY); e.preventDefault(); }, {passive:false});

  function frame(){
    maybeBloom();
    blooms = blooms.filter(b=>b.age<b.max);

    // Player drift — viscous, slower than usual
    playerX += (targetX-playerX)*0.10;
    playerY += (targetY-playerY)*0.10;
    const px=Math.round(playerX), py=Math.round(playerY);

    bloomFlashLevel *= 0.88;
    bloomEl.style.background = `rgba(255,180,200,${(bloomFlashLevel*0.10).toFixed(3)})`;

    const grid=[], colors=[];
    for (let y=0;y<H;y++){
      grid[y] = new Array(W).fill(' ');
      colors[y] = new Array(W).fill('hsl(330,30%,4%)');
    }

    // Background — soft gradient + sparse syrup drips
    for (let y=0;y<H;y++){
      for (let x=0;x<W;x++){
        // Gentle soft pink bg
        const yNorm = y/H;
        const noise = Math.sin(x*0.18+t*0.3) * Math.sin(y*0.22+t*0.2) * 0.1;
        const l = 4 + yNorm*3 + noise*2;
        grid[y][x] = ' ';
        colors[y][x] = `hsl(${330+yNorm*20},${28+yNorm*8}%,${l|0}%)`;
      }
    }

    // Syrup channels — slow flowing diagonals
    for (const s of syrup){
      for (let y=0;y<H;y++){
        const sway = Math.sin(y*0.2 + t*s.speed + s.phase) * s.amp;
        const x = (s.x + sway)|0;
        if (x>=0 && x<W){
          const flowChar = (Math.sin(y*0.3 + t*1.2 + s.phase) > 0) ? '~' : '=';
          if (grid[y][x] === ' '){
            grid[y][x] = flowChar;
            colors[y][x] = `hsl(${340+Math.random()*15},65%,${(34+Math.sin(y*0.25+t)*8)|0}%)`;
          }
        }
      }
    }

    // Crystals — shimmer, larger center, smaller edges
    for (const c of crystals){
      if (c.x<0||c.x>=W||c.y<0||c.y>=H) continue;
      const shimmer = (Math.sin(c.phase + t*1.2)+1)/2;
      let ch;
      if (c.big){
        ch = shimmer > 0.7 ? '#' : (shimmer > 0.3 ? '%' : '*');
      } else {
        ch = shimmer > 0.7 ? '*' : (shimmer > 0.4 ? '+' : '.');
      }
      grid[c.y][c.x] = ch;
      const l = 50 + shimmer*35;
      let h_;
      if (c.gold) h_ = 45;
      else if (c.rose) h_ = 350;
      else h_ = 320;
      colors[c.y][c.x] = `hsl(${h_},${(70+shimmer*15)|0}%,${l|0}%)`;
    }

    // Bloom events — radial sparkle burst
    for (const b of blooms){
      const radius = b.age * 0.7;
      for (let dy=-7; dy<=7; dy++){
        for (let dx=-10; dx<=10; dx++){
          const x=b.x+dx, y=b.y+dy;
          if (x<0||x>=W||y<0||y>=H) continue;
          const d = Math.sqrt(dx*dx+dy*dy);
          if (Math.abs(d-radius) < 1.5){
            const alpha = (1-b.age/b.max) * (1 - Math.abs(d-radius)/1.5);
            if (alpha > 0.2 && grid[y][x] !== '#'){
              grid[y][x] = alpha > 0.6 ? '*' : '+';
              const l = 70 + alpha*25;
              colors[y][x] = `hsl(50,90%,${l|0}%)`;
            }
          }
        }
      }
      b.age++;
    }

    // Sparkles — drift, occasional bright twinkle
    for (const s of sparkles){
      s.x += s.vx; s.y += s.vy; s.phase += 0.07;
      if (s.x<0) s.x=W-1; if (s.x>=W) s.x=0;
      if (s.y<0) s.y=H-1; if (s.y>=H) s.y=0;
      const x=s.x|0, y=s.y|0;
      const tw = (Math.sin(s.phase)+1)/2;
      if (tw > 0.7 && grid[y][x] === ' '){
        grid[y][x] = tw > 0.9 ? '*' : '.';
        const l = 60 + tw*30;
        if (s.gold) colors[y][x] = `hsl(45,90%,${l|0}%)`;
        else colors[y][x] = `hsl(330,75%,${l|0}%)`;
      }
    }

    // Player — small candy-like avatar
    if (px>=0&&px<W&&py>=0&&py<H){
      grid[py][px] = '@';
      colors[py][px] = 'hsl(50,95%,80%)';
      // sweet trail
      if (px-1>=0 && grid[py][px-1] === ' '){ grid[py][px-1] = "'"; colors[py][px-1] = 'hsl(50,80%,55%)'; }
      if (px+1<W && grid[py][px+1] === ' '){ grid[py][px+1] = "'"; colors[py][px+1] = 'hsl(50,80%,55%)'; }
    }

    // Render
    let buf='';
    for (let y=0;y<H;y++){
      let prev=null, span='';
      for (let x=0;x<W;x++){
        let ch = grid[y][x];
        if (ch==='<') ch='&lt;';
        else if (ch==='>') ch='&gt;';
        else if (ch==='&') ch='&amp;';
        const c = colors[y][x];
        if (c===prev) span += ch;
        else { if (span) buf+=`<span style="color:${prev}">${span}</span>`; span=ch; prev=c; }
      }
      if (span) buf += `<span style="color:${prev}">${span}</span>`;
      buf += '\n';
    }
    screen.innerHTML = buf;

    // HUD
    document.getElementById('hud-sugar').textContent = (85 + Math.sin(t*0.2)*4).toFixed(1) + '%';
    document.getElementById('hud-hr').textContent = (70 + Math.floor(Math.sin(t*0.5)*4) + Math.floor(bloomFlashLevel*8));
    document.getElementById('hud-crystals').textContent = crystals.length;
    const flash = blooms.length>0 ? 'BLOOMING' : (bloomFlashLevel>0.1 ? 'RADIANT' : 'CLOYING');
    document.getElementById('hud-sweet').textContent = flash;
    document.getElementById('hud-visc').textContent = bloomFlashLevel>0.3 ? 'CRYSTAL' : 'SYRUP';

    t += 0.06;
    requestAnimationFrame(frame);
  }

  computeSize();
  window.addEventListener('resize', computeSize);
  requestAnimationFrame(frame);
  </script>
</body>
</html>
