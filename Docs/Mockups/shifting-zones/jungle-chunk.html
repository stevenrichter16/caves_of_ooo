<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Shifting Zone — Jungle Chunk (Live)</title>
<style>
  :root { --bg:#021006; --hud:#6c8; --hud-label:#1a2e22; --hud-stat:#9d6; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--hud); font-family:'Menlo','Courier New',Consolas,monospace; overflow:hidden; height:100vh; height:100dvh; user-select:none; -webkit-user-select:none; touch-action:none; }
  #wrapper { padding:14px; box-sizing:border-box; height:100vh; height:100dvh; display:flex; flex-direction:column; }
  #hud { color:var(--hud); font-size:11px; letter-spacing:1.4px; margin-bottom:10px; border-bottom:1px solid #1c2820; padding-bottom:8px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:6px 16px; text-shadow:0 0 4px rgba(110,220,140,.3); flex-shrink:0; }
  #hud .group { display:flex; gap:14px; flex-wrap:wrap; }
  .label { color:var(--hud-label); } .stat { color:var(--hud-stat); }
  .stat.choir { color:#c8a; }
  .stat.sun { color:#ed8; }
  button.regen, button.tspeed { background:none; border:1px solid #1c4030; color:#9d6; font-family:inherit; font-size:11px; letter-spacing:1.5px; padding:4px 10px; cursor:pointer; margin-left:4px; }
  button.regen:hover, button.regen:active, button.tspeed:hover, button.tspeed:active { background:#0c2018; border-color:#3a6;}
  #screen-wrap { flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  #screen { font-size:14px; line-height:1.0; white-space:pre; text-shadow:0 0 4px rgba(120,255,140,.32),0 0 12px rgba(0,180,40,.16); cursor:crosshair; }
  .scanlines { position:fixed; inset:0; background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0,rgba(0,0,0,0) 2px,rgba(0,0,0,.18) 3px,rgba(0,0,0,0) 4px); pointer-events:none; z-index:100; }
  .vignette { position:fixed; inset:0; background:radial-gradient(ellipse at center,rgba(0,0,0,0) 50%,rgba(0,0,0,.85) 100%); pointer-events:none; z-index:99; }
  .crt-glow { position:fixed; inset:0; box-shadow:inset 0 0 220px rgba(0,180,40,.06); pointer-events:none; z-index:98; }
  /* Day-night sky tint overlay — modulated by sun angle */
  .sky-tint { position:fixed; inset:0; pointer-events:none; z-index:97; transition:background-color 0.3s; }
  a.back { position:fixed; top:10px; right:14px; color:#1a2e22; font-size:11px; letter-spacing:2px; text-decoration:none; z-index:200; padding:4px 8px; }
  a.back:hover,a.back:active { color:#6c8; }
  .hint { position:fixed; bottom:8px; left:14px; color:#1a2e22; font-size:10px; letter-spacing:1.5px; z-index:200; max-width:60vw; }
  .src { position:fixed; bottom:8px; right:14px; color:#1a2e22; font-size:9px; letter-spacing:1.5px; z-index:200; }
</style>
</head>
<body>
  <a href="index.html" class="back">&lt; ZONES</a>
  <div id="wrapper">
    <div id="hud">
      <div class="group">
        <span><span class="label">SEED:</span> <span class="stat" id="hud-seed">—</span></span>
        <span><span class="label">TIME:</span> <span class="stat sun" id="hud-time">—</span></span>
        <span><span class="label">SUN:</span> <span class="stat sun" id="hud-sun">—</span></span>
        <span><span class="label">CHOIR-PATCHES:</span> <span class="stat choir" id="hud-choir">—</span></span>
        <span><span class="label">CREATURE:</span> <span class="stat" id="hud-crit">—</span></span>
      </div>
      <div class="group">
        <span><span class="label">TREES:</span> <span class="stat" id="hud-trees">—</span></span>
        <span><span class="label">BUSHES:</span> <span class="stat" id="hud-bushes">—</span></span>
        <span><span class="label">OPEN%:</span> <span class="stat" id="hud-open">—</span></span>
        <span><button class="tspeed" id="tspeed">×1</button><button class="regen" id="regen">REGEN ⟲</button></span>
      </div>
    </div>
    <div id="screen-wrap"><div id="screen"></div></div>
  </div>
  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div class="crt-glow"></div>
  <div class="sky-tint" id="sky-tint"></div>
  <div class="hint">SUN RAYS RAYCAST FROM SKY EDGE EVERY FRAME &middot; ANGLE DRIVEN BY TIME-OF-DAY &middot; TAP ×1 TO SPEED UP</div>
  <div class="src">SOURCE: FieldOfView.cs (shadowcasting LOS) — sun rays use the same primitive with a virtual sky-origin</div>

  <script>
  'use strict';
  /*
   * SUN-RAY RAYCASTING — DESIGN NOTE
   * ================================
   * The game's FieldOfView.cs uses recursive shadowcasting in 8 octants
   * from a player origin (cx, cy) with a vision radius. That's the same
   * primitive sunlight needs: "from a viewpoint, which tiles are reachable
   * through unblocked space?"
   *
   * The DEMO here uses a parallel-ray sweep at angle θ across the zone's
   * sky-edge — visually matching real sunlight through a forest canopy
   * (rays nearly parallel because the sun is far away).
   *
   * The REAL GAME could reuse FieldOfView.Compute() directly:
   *   - Place a virtual sun origin far outside the zone:
   *       (Width/2 + sin(θ)*1000, -cos(θ)*1000)
   *   - Use radius = 1100 (large enough to reach all tiles)
   *   - The ~99% parallel rays at zone scale produce equivalent results
   *   - Zero new algorithm code — just call Compute() with a different origin
   *
   * Either approach: the angle θ varies with time-of-day, NOT with player
   * movement. That's the key reframing — same primitive, different driver.
   */

  // === ZONE DIMENSIONS (Zone.cs:13) ===
  const ZONE_W = 80, ZONE_H = 25;

  // === JUNGLE BUILDER PARAMS (JungleBuilder.cs:18-22) ===
  const SEED_CHANCE = 48;
  const CA_PASSES = 2;
  const NOISE_THRESHOLD = 0.47;
  const TREE_CHANCE = 0.10;
  const BUSH_CHANCE = 0.08;

  // === CELLULAR AUTOMATA (CellularAutomata.cs) ===
  const BORN_LIST = [6, 7, 8];
  const SURVIVE_LIST = [5, 6, 7, 8];
  const BORDER_DEPTH = 2;
  const SEED_BORDERS = true;

  // Grass variants from Objects.json: "...,.'`"
  const GRASS_VARIANTS = ['.', '.', '.', ',', '.', "'", '`'];

  function mulberry32(seed) {
    return function() {
      seed |= 0; seed = seed + 0x6D2B79F5 | 0;
      let t = seed;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  function makeRng(seed) {
    const rand = mulberry32(seed);
    return { nextDouble: () => rand(), next: (min, maxExclusive) => Math.floor(rand() * (maxExclusive - min)) + min };
  }

  // === CellularAutomata.cs port ===
  function generateCA(rng) {
    let cells = new Array(ZONE_W * ZONE_H);
    for (let x = 0; x < ZONE_W; x++) for (let y = 0; y < ZONE_H; y++) {
      const isBorder = x < BORDER_DEPTH || x >= ZONE_W - BORDER_DEPTH || y < BORDER_DEPTH || y >= ZONE_H - BORDER_DEPTH;
      cells[y * ZONE_W + x] = SEED_BORDERS && isBorder ? 1 : (rng.next(1, 101) <= SEED_CHANCE ? 1 : 0);
    }
    for (let p = 0; p < CA_PASSES; p++) cells = applyCAPass(cells);
    return cells;
  }
  function applyCAPass(cells) {
    const next = new Array(ZONE_W * ZONE_H);
    for (let x = 0; x < ZONE_W; x++) for (let y = 0; y < ZONE_H; y++) {
      const isBorder = x < BORDER_DEPTH || x >= ZONE_W - BORDER_DEPTH || y < BORDER_DEPTH || y >= ZONE_H - BORDER_DEPTH;
      if (SEED_BORDERS && isBorder) { next[y * ZONE_W + x] = 1; continue; }
      const n = countNeighbors(cells, x, y);
      next[y * ZONE_W + x] = cells[y * ZONE_W + x] === 1 ? (SURVIVE_LIST.includes(n) ? 1 : 0) : (BORN_LIST.includes(n) ? 1 : 0);
    }
    return next;
  }
  function countNeighbors(cells, cx, cy) {
    let c = 0;
    for (let dx = -1; dx <= 1; dx++) for (let dy = -1; dy <= 1; dy++) {
      if (dx === 0 && dy === 0) continue;
      const nx = cx + dx, ny = cy + dy;
      if (nx < 0 || nx >= ZONE_W || ny < 0 || ny >= ZONE_H) c++;
      else if (cells[ny * ZONE_W + nx] === 1) c++;
    }
    return c;
  }

  // === SimpleNoise.cs port ===
  function noiseLayer(width, height, frequency, amplitude, rng) {
    const baseW = ((width / frequency) | 0) + 2, baseH = ((height / frequency) | 0) + 2;
    const baseN = new Float32Array(baseW * baseH);
    for (let i = 0; i < baseN.length; i++) baseN[i] = rng.nextDouble();
    return { baseN, baseW, baseH, frequency, amplitude };
  }
  function interpolateCos(a, b, t) { const f = (1 - Math.cos(t * Math.PI)) * 0.5; return a * (1 - f) + b * f; }
  function sampleLayer(layer, x, y) {
    const sx = x / layer.frequency, sy = y / layer.frequency;
    let ix = sx | 0, iy = sy | 0;
    const fx = sx - ix, fy = sy - iy;
    if (ix < 0) ix = 0; if (ix > layer.baseW - 2) ix = layer.baseW - 2;
    if (iy < 0) iy = 0; if (iy > layer.baseH - 2) iy = layer.baseH - 2;
    const top = interpolateCos(layer.baseN[iy * layer.baseW + ix], layer.baseN[iy * layer.baseW + ix + 1], fx);
    const bot = interpolateCos(layer.baseN[(iy + 1) * layer.baseW + ix], layer.baseN[(iy + 1) * layer.baseW + ix + 1], fx);
    return interpolateCos(top, bot, fy) * layer.amplitude;
  }
  function generateNoiseField(width, height, rng) {
    const FREQ = [4, 16, 64], AMP = [1.0, 0.7, 0.4];
    const layers = [];
    for (let i = 0; i < 3; i++) layers.push(noiseLayer(width, height, FREQ[i], AMP[i], rng));
    const field = new Float32Array(width * height);
    let maxV = -Infinity, minV = Infinity;
    for (let x = 0; x < width; x++) for (let y = 0; y < height; y++) {
      let s = 0;
      for (const l of layers) s += sampleLayer(l, x, y);
      field[y * width + x] = s;
      if (s > maxV) maxV = s; if (s < minV) minV = s;
    }
    let range = maxV - minV; if (range < 0.0001) range = 1;
    for (let i = 0; i < field.length; i++) field[i] = (field[i] - minV) / range;
    return field;
  }

  // === JungleBuilder.cs port ===
  function buildJungle(seed) {
    const rng = makeRng(seed);
    const ca = generateCA(rng);
    const noise = generateNoiseField(ZONE_W, ZONE_H, rng);
    const tiles = new Uint8Array(ZONE_W * ZONE_H);
    for (let i = 0; i < tiles.length; i++) tiles[i] = 1;
    for (let x = 0; x < ZONE_W; x++) for (let y = 0; y < ZONE_H; y++) {
      const idx = y * ZONE_W + x;
      const caOpen = ca[idx] === 0;
      const noiseOpen = noise[idx] <= NOISE_THRESHOLD;
      if (caOpen || noiseOpen) {
        tiles[idx] = 2;
        if (rng.nextDouble() < TREE_CHANCE) tiles[idx] = 3;
        else if (rng.nextDouble() < BUSH_CHANCE) tiles[idx] = 4;
      }
    }
    return { tiles, rng };
  }

  // === SUN-RAY RAYCAST (parallel rays from sky-edge) ===
  // angle in degrees: 0 = sun overhead (rays straight down)
  //                   negative = sun east (rays travel down-right)
  //                   positive = sun west (rays travel down-left)
  // Returns Float32Array of [0..1] sunlight intensity per tile.
  const BEAM_SPACING = 3.2;          // distance between parallel rays
  const STEP_SIZE = 0.45;            // sub-tile step granularity
  const BUSH_ATTENUATION = 0.55;
  const TREE_BLOCKING = 0.0;         // fully opaque
  const VINEWALL_BLOCKING = 0.0;     // fully opaque
  function castSunRays(tiles, sunAngleDeg) {
    const W = ZONE_W, H = ZONE_H;
    const lit = new Float32Array(W * H);
    const angle = sunAngleDeg * Math.PI / 180;
    const dx = Math.sin(angle);     // ray x-direction
    const dy = Math.cos(angle);     // ray y-direction (positive = downward)
    if (dy < 0.05) return lit;      // sun below horizon — no light
    // The "sky edge" extends past the zone borders for shallow angles
    const padding = Math.abs(Math.tan(angle)) * H + 4;
    const startMin = -padding;
    const startMax = W + padding;
    for (let sx = startMin; sx <= startMax; sx += BEAM_SPACING) {
      let cx = sx, cy = -1.5;
      let strength = 1.0;
      const maxSteps = (W + H) * 3;
      for (let s = 0; s < maxSteps; s++) {
        cx += dx * STEP_SIZE;
        cy += dy * STEP_SIZE;
        if (cy >= H) break;
        if (cx < -1 || cx >= W + 1) break;
        if (cy < 0) continue;
        if (cx < 0 || cx >= W) continue;
        const ix = cx | 0, iy = cy | 0;
        const tIdx = iy * W + ix;
        const tile = tiles[tIdx];
        if (lit[tIdx] < strength) lit[tIdx] = strength;
        if (tile === 1) { strength = VINEWALL_BLOCKING; break; }
        if (tile === 3) { strength = TREE_BLOCKING; break; }
        if (tile === 4) strength *= BUSH_ATTENUATION;
        if (strength < 0.05) break;
      }
    }
    return lit;
  }

  // === FEATURE DETECTION (post-generation) ===
  function floodFillRegions(tiles, predicate) {
    const W = ZONE_W, H = ZONE_H;
    const visited = new Uint8Array(W * H);
    const regions = [];
    for (let i = 0; i < tiles.length; i++) {
      if (visited[i] || !predicate(tiles[i])) continue;
      const region = [];
      const stack = [i];
      while (stack.length) {
        const idx = stack.pop();
        if (visited[idx] || !predicate(tiles[idx])) continue;
        visited[idx] = 1;
        region.push(idx);
        const x = idx % W, y = (idx / W) | 0;
        if (x > 0) stack.push(idx - 1);
        if (x < W - 1) stack.push(idx + 1);
        if (y > 0) stack.push(idx - W);
        if (y < H - 1) stack.push(idx + W);
      }
      regions.push(region);
    }
    regions.sort((a, b) => b.length - a.length);
    return regions;
  }

  // === DYNAMIC FEATURES ===
  let chunk = null;
  let openSet = null, openTrees = null;
  let vinePulses = [], vineClusters = [];
  let choirPatches = [];
  let creature = null;
  let insectTreeIdx = -1;
  let insects = [];
  let stillness = null;
  let lastCreatureMoveAt = 0;

  let seed = (Math.random() * 0xFFFF) | 0;
  let playerX = ZONE_W / 2 | 0, playerY = ZONE_H / 2 | 0;
  let targetX = playerX, targetY = playerY;
  let t = 0;
  let windPhase = 0;
  let tileWindOffset = null;
  let windFrontX = -10;

  // === TIME OF DAY ===
  // dayPhase ∈ [0, 1) maps to a full 24-hour day cycle:
  //   0.00 = midnight (sun below horizon)
  //   0.25 = sunrise (sun crests east, angle ≈ -85°)
  //   0.50 = noon (sun overhead, angle = 0°)
  //   0.75 = sunset (sun crests west, angle ≈ +85°)
  //   1.00 = back to midnight
  let dayPhase = 0.30;   // start at mid-morning
  let timeSpeed = 1;     // multiplier — toggle 1×/4×/16×/64×

  // Sun angle from dayPhase. Below horizon (night) returns angle that yields dy<0.
  function sunAngleFromPhase(phase) {
    // Map [0.25..0.75] to [-85..+85]; outside that, sun is below horizon (use a value that yields dy<0)
    if (phase < 0.25 || phase > 0.75) return 180;  // dy = cos(180°) = -1, sun below horizon
    const t = (phase - 0.25) / 0.5;  // 0..1 across daylight
    return -85 + t * 170;
  }
  function timeLabel(phase) {
    if (phase < 0.20) return 'NIGHT';
    if (phase < 0.27) return 'DAWN';
    if (phase < 0.40) return 'MORNING';
    if (phase < 0.55) return 'NOON';
    if (phase < 0.68) return 'AFTERNOON';
    if (phase < 0.78) return 'DUSK';
    return 'NIGHT';
  }
  function clockLabel(phase) {
    const totalMin = phase * 24 * 60;
    const h = Math.floor(totalMin / 60), m = Math.floor(totalMin % 60);
    return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
  }

  let litMap = null;

  function regenerate() {
    seed = (Math.random() * 0xFFFFFF) | 0;
    document.getElementById('hud-seed').textContent = '0x' + seed.toString(16).toUpperCase().padStart(4, '0');
    chunk = buildJungle(seed);
    const tiles = chunk.tiles;
    const rng = chunk.rng;

    openSet = new Set(); openTrees = new Set();
    for (let i = 0; i < tiles.length; i++) {
      if (tiles[i] === 2 || tiles[i] === 4) openSet.add(i);
      if (tiles[i] === 3) openTrees.add(i);
    }

    // Vine clusters
    const vineRegions = floodFillRegions(tiles, t => t === 1);
    vineClusters = [];
    for (const region of vineRegions) {
      if (region.length >= 14) vineClusters.push(new Set(region));
    }

    // Choir patches
    choirPatches = [];
    const numPatches = Math.floor(rng.nextDouble() * 3);
    for (let i = 0; i < numPatches; i++) {
      choirPatches.push({
        cx: 4 + rng.nextDouble() * (ZONE_W - 8),
        cy: 2 + rng.nextDouble() * (ZONE_H - 4),
        radius: 2.5 + rng.nextDouble() * 2,
        phase: rng.nextDouble() * Math.PI * 2
      });
    }

    // Creature
    if (openSet.size > 0) {
      const arr = [...openSet];
      const startIdx = arr[(rng.nextDouble() * arr.length) | 0];
      creature = { x: startIdx % ZONE_W, y: (startIdx / ZONE_W) | 0, trail: [] };
    } else creature = null;

    // Insect cluster
    if (openTrees.size > 0) {
      const arr = [...openTrees];
      insectTreeIdx = arr[(rng.nextDouble() * arr.length) | 0];
      const numIns = 4 + ((rng.nextDouble() * 3) | 0);
      insects = [];
      for (let i = 0; i < numIns; i++) {
        insects.push({
          angleOffset: rng.nextDouble() * Math.PI * 2,
          radius: 1.5 + rng.nextDouble() * 1.4,
          speed: 0.04 + rng.nextDouble() * 0.05,
          ySquish: 0.55
        });
      }
    } else { insectTreeIdx = -1; insects = []; }

    // Stillness
    if (openSet.size > 0) {
      const arr = [...openSet];
      const stillIdx = arr[(rng.nextDouble() * arr.length) | 0];
      stillness = { cx: stillIdx % ZONE_W, cy: (stillIdx / ZONE_W) | 0, radius: 4 };
    }

    findOpenSpawn();
    buildTilePhaseTable();

    let trees = 0, bushes = 0, open = 0;
    for (let i = 0; i < tiles.length; i++) {
      if (tiles[i] === 3) trees++;
      else if (tiles[i] === 4) bushes++;
      if (tiles[i] >= 2) open++;
    }
    document.getElementById('hud-trees').textContent = trees;
    document.getElementById('hud-bushes').textContent = bushes;
    document.getElementById('hud-open').textContent = ((open / (ZONE_W * ZONE_H)) * 100).toFixed(0) + '%';
    document.getElementById('hud-choir').textContent = choirPatches.length;
    document.getElementById('hud-crit').textContent = creature ? 'TRACKED' : 'NONE';
  }

  function findOpenSpawn() {
    const tiles = chunk.tiles;
    for (let r = 0; r < 20; r++) {
      for (let dy = -r; dy <= r; dy++) for (let dx = -r; dx <= r; dx++) {
        const x = (ZONE_W / 2 | 0) + dx, y = (ZONE_H / 2 | 0) + dy;
        if (x < 0 || x >= ZONE_W || y < 0 || y >= ZONE_H) continue;
        if (tiles[y * ZONE_W + x] === 2) {
          playerX = x; playerY = y; targetX = x; targetY = y;
          return;
        }
      }
    }
  }

  function buildTilePhaseTable() {
    tileWindOffset = new Float32Array(ZONE_W * ZONE_H);
    for (let i = 0; i < tileWindOffset.length; i++) tileWindOffset[i] = Math.random() * Math.PI * 2;
  }

  function stepCreature() {
    if (!creature) return;
    const tiles = chunk.tiles;
    creature.trail.push({ idx: creature.y * ZONE_W + creature.x, age: 0 });
    if (creature.trail.length > 5) creature.trail.shift();
    const opts = [];
    for (const [dx, dy] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
      const nx = creature.x + dx, ny = creature.y + dy;
      if (nx < 0 || nx >= ZONE_W || ny < 0 || ny >= ZONE_H) continue;
      const tile = tiles[ny * ZONE_W + nx];
      if (tile === 2 || tile === 4) opts.push([nx, ny]);
    }
    if (opts.length) {
      const pick = opts[(Math.random() * opts.length) | 0];
      creature.x = pick[0]; creature.y = pick[1];
    }
    for (const tr of creature.trail) tr.age++;
  }

  function maybeSpawnVinePulse() {
    if (vineClusters.length === 0 || vinePulses.length >= 2) return;
    if (Math.random() < 0.022) {
      const cluster = vineClusters[(Math.random() * vineClusters.length) | 0];
      const arr = [...cluster];
      const origin = arr[(Math.random() * arr.length) | 0];
      const distMap = new Map();
      const queue = [origin];
      distMap.set(origin, 0);
      while (queue.length) {
        const idx = queue.shift();
        const d = distMap.get(idx);
        const x = idx % ZONE_W, y = (idx / ZONE_W) | 0;
        for (const [dx, dy] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
          const nx = x + dx, ny = y + dy;
          if (nx < 0 || nx >= ZONE_W || ny < 0 || ny >= ZONE_H) continue;
          const nidx = ny * ZONE_W + nx;
          if (cluster.has(nidx) && !distMap.has(nidx)) {
            distMap.set(nidx, d + 1);
            queue.push(nidx);
          }
        }
      }
      let maxD = 0;
      for (const d of distMap.values()) if (d > maxD) maxD = d;
      vinePulses.push({ distMap, age: 0, max: maxD + 6 });
    }
  }

  // === INPUT ===
  const screen = document.getElementById('screen');
  const skyTint = document.getElementById('sky-tint');
  function setTarget(clientX, clientY) {
    const r = screen.getBoundingClientRect();
    const x = Math.floor((clientX - r.left) / (r.width / ZONE_W));
    const y = Math.floor((clientY - r.top) / (r.height / ZONE_H));
    if (x >= 0 && x < ZONE_W && y >= 0 && y < ZONE_H) {
      const tile = chunk.tiles[y * ZONE_W + x];
      if (tile === 2 || tile === 4) { targetX = x; targetY = y; }
    }
  }
  let dragging = false;
  screen.addEventListener('mousedown', e => { dragging = true; setTarget(e.clientX, e.clientY); });
  window.addEventListener('mousemove', e => { if (dragging) setTarget(e.clientX, e.clientY); });
  window.addEventListener('mouseup', () => dragging = false);
  screen.addEventListener('touchstart', e => { const tt = e.touches[0]; setTarget(tt.clientX, tt.clientY); e.preventDefault(); }, {passive: false});
  screen.addEventListener('touchmove', e => { const tt = e.touches[0]; setTarget(tt.clientX, tt.clientY); e.preventDefault(); }, {passive: false});
  document.getElementById('regen').addEventListener('click', e => { e.preventDefault(); regenerate(); });
  const speedBtn = document.getElementById('tspeed');
  const SPEEDS = [1, 4, 16, 64];
  let speedIdx = 0;
  speedBtn.addEventListener('click', e => {
    e.preventDefault();
    speedIdx = (speedIdx + 1) % SPEEDS.length;
    timeSpeed = SPEEDS[speedIdx];
    speedBtn.textContent = '×' + timeSpeed;
  });

  // === RENDER ===
  function frame() {
    const tiles = chunk.tiles;

    // Advance day/night cycle (1 second of demo ≈ 30 in-game minutes at ×1)
    // Full day = 48 demo seconds at ×1
    dayPhase += (1 / 48 / 60) * timeSpeed * 1.6;
    if (dayPhase >= 1) dayPhase -= 1;
    const sunAngle = sunAngleFromPhase(dayPhase);
    const isDaytime = sunAngle >= -89 && sunAngle <= 89;

    // Recompute sunlight every frame — it's cheap (~30 rays × 25 steps = ~750 ops)
    litMap = isDaytime ? castSunRays(tiles, sunAngle) : new Float32Array(ZONE_W * ZONE_H);

    // Sky tint based on time of day
    let skyR=0, skyG=0, skyB=0, skyA=0;
    if (dayPhase < 0.22 || dayPhase > 0.78) { skyR=4; skyG=0; skyB=22; skyA=0.55; }     // night blue-violet
    else if (dayPhase < 0.28) { skyR=255; skyG=110; skyB=60; skyA=0.18; }                  // dawn orange
    else if (dayPhase > 0.72) { skyR=255; skyG=80; skyB=50; skyA=0.22; }                   // dusk red-orange
    else if (dayPhase < 0.34 || dayPhase > 0.66) { skyR=255; skyG=200; skyB=130; skyA=0.06; } // golden hour
    else { skyA=0; }                                                                         // midday — no tint
    skyTint.style.background = `rgba(${skyR},${skyG},${skyB},${skyA})`;

    // Step creature every ~24 frames
    if (t - lastCreatureMoveAt > 1.4) { stepCreature(); lastCreatureMoveAt = t; }

    maybeSpawnVinePulse();
    vinePulses = vinePulses.filter(p => p.age < p.max);

    windPhase += 0.04;
    windFrontX = ((windPhase * 6) % (ZONE_W + 14)) - 7;

    if (Math.abs(targetX - playerX) > 0.02) playerX += (targetX - playerX) * 0.20;
    if (Math.abs(targetY - playerY) > 0.02) playerY += (targetY - playerY) * 0.20;
    const px = Math.round(playerX), py = Math.round(playerY);

    const stillCx = stillness ? stillness.cx : -100;
    const stillCy = stillness ? stillness.cy : -100;
    const stillR = stillness ? stillness.radius : 0;

    // Insect positions for this frame
    const insectMap = new Map();
    if (insectTreeIdx >= 0 && insects.length) {
      const tx = insectTreeIdx % ZONE_W, ty = (insectTreeIdx / ZONE_W) | 0;
      for (const ins of insects) {
        const ang = ins.angleOffset + t * ins.speed * 6;
        const ix = Math.round(tx + Math.cos(ang) * ins.radius);
        const iy = Math.round(ty + Math.sin(ang) * ins.radius * ins.ySquish);
        if (ix < 0 || ix >= ZONE_W || iy < 0 || iy >= ZONE_H) continue;
        const tile = tiles[iy * ZONE_W + ix];
        if (tile === 1) continue;
        insectMap.set(iy * ZONE_W + ix, { ch: '*', color: 'hsl(50,90%,75%)' });
      }
    }

    // Night dimming factor
    let nightDim = 1;
    if (dayPhase < 0.20 || dayPhase > 0.80) nightDim = 0.18;
    else if (dayPhase < 0.27) nightDim = 0.18 + (dayPhase - 0.20) / 0.07 * 0.7;
    else if (dayPhase > 0.73) nightDim = 0.88 - (dayPhase - 0.73) / 0.07 * 0.7;
    else nightDim = 0.92;

    let buf = '';
    for (let y = 0; y < ZONE_H; y++) {
      let prev = null, span = '';
      for (let x = 0; x < ZONE_W; x++) {
        const idx = y * ZONE_W + x;
        const tile = tiles[idx];
        let ch = ' ', color = '#000';

        const stillD = Math.sqrt((x - stillCx)*(x - stillCx) + (y - stillCy)*(y - stillCy));
        const stillFactor = stillD < stillR ? Math.max(0.15, stillD / stillR) : 1.0;

        // BASE TILE
        if (tile === 1) {
          ch = '#';
          let baseL = 55;
          let pulseBoost = 0;
          for (const p of vinePulses) {
            const d = p.distMap.get(idx);
            if (d == null) continue;
            const wave = p.age - d;
            if (wave > -1.5 && wave < 3) pulseBoost = Math.max(pulseBoost, Math.exp(-Math.abs(wave) * 0.7) * (1 - p.age / p.max));
          }
          baseL = (55 + pulseBoost * 30) * nightDim;
          color = `hsl(${pulseBoost > 0.1 ? 115 : 120},100%,${baseL|0}%)`;
        } else if (tile === 2) {
          const phase = tileWindOffset[idx] + t * 0.5 * stillFactor;
          const rippleNear = Math.abs(x - windFrontX) < 2.5 * stillFactor;
          let variantIdx;
          if (rippleNear) {
            variantIdx = 3 + Math.floor((phase * 1.6) % 4);
            if (variantIdx >= GRASS_VARIANTS.length) variantIdx = GRASS_VARIANTS.length - 1;
          } else {
            const v = (Math.sin(phase) + 1) / 2;
            if (v < 0.92) variantIdx = 0;
            else if (v < 0.96) variantIdx = 3;
            else if (v < 0.98) variantIdx = 5;
            else variantIdx = 6;
          }
          ch = GRASS_VARIANTS[variantIdx];
          const lightness = (30 + (Math.sin(phase + x * 0.3) + 1) * 3) * nightDim;
          color = `hsl(120,100%,${lightness|0}%)`;
        } else if (tile === 3) {
          ch = 'T';
          color = `hsl(120,100%,${(60 * nightDim)|0}%)`;
        } else if (tile === 4) {
          ch = ';';
          const phase = tileWindOffset[idx] + t * 0.4 * stillFactor;
          if (Math.abs(x - windFrontX) < 2.5 * stillFactor) ch = (Math.sin(phase * 2) > 0) ? ';' : ':';
          color = `hsl(120,90%,${(52 * nightDim)|0}%)`;
        }

        // === SUN-RAY ILLUMINATION ===
        // Apply gold tint where the raycaster says light reaches
        const sunlit = litMap[idx];
        if (sunlit > 0.05 && tile !== 1 && tile !== 3) {
          // Hue shifts toward gold; dawn/dusk push it more red, midday more white
          let sunHue;
          if (dayPhase < 0.30) sunHue = 18 + dayPhase * 80;
          else if (dayPhase > 0.70) sunHue = 18 + (1 - dayPhase) * 80;
          else sunHue = 50;
          const sunSat = 80 + sunlit * 10;
          const baseLightness = (tile === 2 ? 30 : tile === 4 ? 50 : 0);
          const sunBoost = sunlit * 35 * (dayPhase > 0.30 && dayPhase < 0.70 ? 1.0 : 0.7);
          const finalL = Math.min(85, (baseLightness + sunBoost) * nightDim + sunlit * 25);
          color = `hsl(${sunHue|0},${sunSat|0}%,${finalL|0}%)`;
          // Brighter glyphs in strong sunlight on grass
          if (tile === 2 && sunlit > 0.6) ch = "'";
        }

        // === CHOIR PATCHES (override) ===
        for (const patch of choirPatches) {
          const dx2 = x - patch.cx, dy2 = y - patch.cy;
          const d2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
          if (d2 < patch.radius) {
            const pulse = (Math.sin(t * 1.2 + patch.phase) + 1) / 2;
            const intensity = (1 - d2 / patch.radius) * (0.55 + pulse * 0.45);
            if (intensity > 0.1) {
              if (tile === 1) {
                color = `hsl(${(290 - intensity * 10)|0},${(60 + intensity * 20)|0}%,${((38 + intensity * 28) * nightDim)|0}%)`;
                if (intensity > 0.6 && Math.sin(t * 2 + tileWindOffset[idx]) > 0) ch = '%';
              } else if (tile === 2 || tile === 4) {
                color = `hsl(${(110 - intensity * 60)|0},${(60 - intensity * 20)|0}%,${((22 + intensity * 14) * nightDim)|0}%)`;
              } else if (tile === 3) {
                color = `hsl(${(100 - intensity * 30)|0},60%,${((45 - intensity * 8) * nightDim)|0}%)`;
              }
            }
          }
        }

        // CREATURE TRAIL & CREATURE
        if (creature) {
          for (const tr of creature.trail) {
            if (tr.idx === idx && (tile === 2 || tile === 4)) {
              const fade = 1 - tr.age / 5;
              if (fade > 0.2) {
                ch = ',';
                color = `hsl(80,${(50 + fade * 20)|0}%,${((28 + fade * 12) * nightDim)|0}%)`;
              }
            }
          }
          if (creature.x === x && creature.y === y) {
            ch = 'r';
            color = `hsl(35,80%,${(70 * nightDim)|0}%)`;
          }
        }

        // INSECTS
        const inser = insectMap.get(idx);
        if (inser) { ch = inser.ch; color = inser.color; }

        // PLAYER
        if (x === px && y === py) {
          ch = '@';
          color = 'hsl(50,95%,82%)';
        }

        if (ch === '<') ch = '&lt;';
        else if (ch === '>') ch = '&gt;';
        else if (ch === '&') ch = '&amp;';

        if (color === prev) span += ch;
        else { if (span) buf += `<span style="color:${prev}">${span}</span>`; span = ch; prev = color; }
      }
      if (span) buf += `<span style="color:${prev}">${span}</span>`;
      buf += '\n';
    }
    screen.innerHTML = buf;

    for (const p of vinePulses) p.age++;

    // HUD updates
    document.getElementById('hud-time').textContent = clockLabel(dayPhase) + ' · ' + timeLabel(dayPhase);
    document.getElementById('hud-sun').textContent = isDaytime ? (sunAngle >= 0 ? '+' : '') + sunAngle.toFixed(0) + '°' : 'BELOW HORIZON';

    t += 0.06;
    requestAnimationFrame(frame);
  }

  regenerate();
  requestAnimationFrame(frame);
  </script>
</body>
</html>
